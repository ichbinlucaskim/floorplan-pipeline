name: CI

# NOTE: floorplan-pipeline is a local-integration repo — it imports the five
# sibling component repos as editable installs. CI therefore needs all sibling
# repos checked out into the parent directory (a workspace checkout). Adjust the
# `repository:`/`path:` values below to your org once the repos are hosted; the
# default checkout assumes a single workspace clone containing every repo under
# ../ (the same layout `make setup` expects).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout workspace (all sibling repos)
        uses: actions/checkout@v4
        with:
          # A workspace checkout that contains aec-schema, wall-extract,
          # panel-decompose, framing-synth, assembly-sequence, aec-ifc-export,
          # and floorplan-pipeline as sibling directories.
          path: aec-project

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install component repos (editable) + this package
        working-directory: aec-project/floorplan-pipeline
        run: |
          pip install -e ../aec-schema
          pip install -e ../wall-extract
          pip install -e ../panel-decompose
          pip install -e ../framing-synth
          pip install -e ../assembly-sequence
          pip install -e ../aec-ifc-export
          pip install -e ".[dev]"

      - name: Lint
        working-directory: aec-project/floorplan-pipeline
        run: ruff check src/ tests/

      - name: Test
        working-directory: aec-project/floorplan-pipeline
        run: python -m pytest tests/ -v
